name: Cinux CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]

jobs:
  host-tests:
    # F-QA Q1-5 (ASan+UBSan+gcov) and F-VERIFY M4 (TSan) are mutually exclusive,
    # so they form a 2-cell matrix instead of two near-identical jobs. The static
    # memory-layout overlap check (F-VERIFY M0-5) runs on the asan cell only --
    # it is an ELF static analysis, sanitizer-independent. Both cells build
    # Release(-O2)+FORTIFY and run `make test_host`.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [asan, tsan]
    steps:
      # Local action (setup-cinux) needs the repo checked out before the runner
      # can read its action.yml -- it cannot be the first step of a job by itself.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          submodules: recursive
      - uses: ./.github/actions/setup-cinux
        with:
          apt-packages: qemu-system-x86 e2fsprogs python3
          cmake-flags: -DCMAKE_BUILD_TYPE=Release -DCINUX_BUILD_TESTS=ON ${{ matrix.sanitizer == 'asan' && '-DCINUX_HOST_ASAN=ON' || '-DCINUX_HOST_TSAN=ON' }}

      - name: Build
        run: |
          ccache --zero-stats
          cmake --build build -j$(nproc)
          ccache --show-stats || true

      - name: Check memory layout (region/LBA overlap)
        if: matrix.sanitizer == 'asan'
        # F-VERIFY M0-5: parse linker scripts + ELF PT_LOAD segments + disk LBA,
        # exit 1 on overlap. Wired so a future static overlap fails CI. Runtime
        # MMIO (xHCI BAR0) can't be caught here -- that's a runtime self-test.
        run: python3 scripts/check_memory_layout.py --mini-elf build/kernel/mini/mini_kernel --big-elf build/kernel/big/big_kernel

      - name: Run host tests
        working-directory: build
        run: make test_host

  line-limits:
    # Pure-python static gates; no toolchain, so it does NOT use setup-cinux.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Check line-count limits
        run: python3 scripts/check_line_limits.py --hpp 500

      - name: Check freestanding headers
        run: python3 scripts/check_freestanding_headers.py

  kernel-tests:
    name: kernel-tests (${{ matrix.build_type }}, ${{ matrix.sanitizer }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # F-QA Q1-3: build-type × sanitizer so UBSAN/LOCKDEP become CI-resident
        # regress gates, and Debug(-O0) vs Release(-O2) both stay green. All 6
        # cells are load-bearing -- do not cut without an F-QA amendment.
        build_type: [Debug, Release]
        sanitizer: [none, ubsan, lockdep]
    steps:
      # Local action (setup-cinux) needs the repo checked out before the runner
      # can read its action.yml -- it cannot be the first step of a job by itself.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          submodules: recursive
      - uses: ./.github/actions/setup-cinux
        with:
          apt-packages: qemu-system-x86 e2fsprogs python3 linux-libc-dev
          cache-musl: 'true'
          cmake-flags: -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DCINUX_BUILD_TESTS=ON ${{ matrix.sanitizer == 'ubsan' && '-DCINUX_UBSAN=ON' || '' }} ${{ matrix.sanitizer == 'lockdep' && '-DCINUX_LOCKDEP=ON' || '' }}

      - name: Build musl user binaries (/hello, /forktest)
        # P3: MUSL_HELLO_SMOKE is ON by default, so CI must build /hello +
        # /forktest for the ext2 image. Cache (in setup-cinux) keys on build-
        # musl.sh; the script is idempotent on libc.a.
        run: |
          tools/musl/build-musl.sh
          tools/musl/build-hello.sh
          tools/musl/build-forktest.sh

      - name: Build
        # Build twice: first pass seeds the KALLSYMS stub, POST_BUILD regenerates
        # the real table from nm; second pass compiles it in (F-INFRA I-5).
        run: |
          ccache --zero-stats
          cmake --build build -j$(nproc)
          cmake --build build -j$(nproc)
          ccache --show-stats || true

      - name: Run kernel tests (single-CPU + -smp 2)
        working-directory: build
        # F-VERIFY: run-kernel-test-all runs single-CPU THEN -smp 2 in one
        # target, so CI can't forget the SMP variant. Either leg failing fails
        # the build (wrapper maps isa-debug-exit). timeout 300 for two QEMU
        # runs; tee captures both legs to serial.log; pipefail propagates exit.
        run: |
          set -o pipefail
          timeout 300 make run-kernel-test-all 2>&1 | tee serial.log

      - name: Check test count did not regress (F-QA Q1-4)
        working-directory: build
        run: bash ${{ github.workspace }}/scripts/check_test_count.sh serial.log

      - name: Upload serial log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-test-serial-log-${{ matrix.build_type }}-${{ matrix.sanitizer }}
          path: build/serial.log
          if-no-files-found: ignore

  busybox-smoke:
    # F-ECO: real userland ecosystem gate as a dedicated job (not multiplied
    # across the 6-cell kernel matrix). Builds static BusyBox, enables
    # CINUX_BUSYBOX_SMOKE, runs both single-CPU and -smp 2 legs.
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      # Local action (setup-cinux) needs the repo checked out before the runner
      # can read its action.yml -- it cannot be the first step of a job by itself.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          submodules: recursive
      - uses: ./.github/actions/setup-cinux
        with:
          apt-packages: qemu-system-x86 e2fsprogs python3 curl bzip2 linux-libc-dev
          cache-musl: 'true'
          cache-busybox: 'true'
          cmake-flags: -DCMAKE_BUILD_TYPE=Release -DCINUX_BUILD_TESTS=ON -DCINUX_BUSYBOX_SMOKE=ON

      - name: Build musl + BusyBox user binaries
        run: |
          tools/musl/build-musl.sh
          tools/musl/build-hello.sh
          tools/musl/build-forktest.sh
          tools/musl/build-busybox.sh

      - name: Build
        run: |
          ccache --zero-stats
          cmake --build build -j$(nproc)
          cmake --build build -j$(nproc)
          ccache --show-stats || true

      - name: Run BusyBox smoke (single-CPU + -smp 2)
        working-directory: build
        run: |
          set -o pipefail
          timeout 300 make run-kernel-test-all 2>&1 | tee busybox-serial.log

      - name: Upload BusyBox serial log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: busybox-smoke-serial-log
          path: build/busybox-serial.log
          if-no-files-found: ignore

  gcc-smoke:
    # F-USABILITY stage 3: real native-GCC toolchain gate.  Builds the buildroot
    # base rootfs (cached), assembles the gcc-profile rootfs (extract.sh gcc
    # closure), and runs run-buildroot-usability under the production kernel so
    # `gcc -fno-pie -no-pie /hello.c -o /tmp/a.out && /tmp/a.out` prints
    # "Hello from GCC!" and cinux-exits 0.  First run downloads+builds buildroot
    # (~10 min); cache hits skip that.  Also the long-overdue buildroot CI gate
    # (stage 2 only had the local run-buildroot-usability target).
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Local action (setup-cinux) needs the repo checked out before the runner
      # can read its action.yml -- it cannot be the first step of a job by itself.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          submodules: recursive
      - uses: ./.github/actions/setup-cinux
        with:
          # cpp: provides cc1 at /usr/lib/gcc/<triple>/<ver>/cc1.  On Debian/Ubuntu
          # build-essential pulls gcc/g++ but NOT cpp, so cc1 is missing without
          # this (Arch's gcc ships cc1 in the main package, hiding the gap locally).
          apt-packages: qemu-system-x86 e2fsprogs python3 curl rsync cpio ncurses-dev libssl-dev bison flex linux-libc-dev cpp
          cmake-flags: -DCMAKE_BUILD_TYPE=Release -DCINUX_BUILD_TESTS=ON -DCINUX_GUI=OFF -DCINUX_ROOTFS_PROFILE=buildroot -DCINUX_ROOTFS_BUILDROOT_IMG=${{ github.workspace }}/build/rootfs-gcc.ext2
          cache-buildroot: 'true'

      - name: Build buildroot base rootfs (cached)
        run: scripts/build-buildroot.sh build/buildroot-ci cinuxos_base_defconfig

      - name: Build kernel image
        run: cmake --build build --target image -j$(nproc)

      - name: Assemble gcc rootfs
        # CI's buildroot target lives under build/buildroot-ci/output (not the
        # stage-1 default build/buildroot), so point assemble at it via env.
        run: |
          BR_TARGET=${{ github.workspace }}/build/buildroot-ci/output/target \
            cmake --build build --target assemble-gcc-rootfs -j$(nproc)

      - name: Run gcc gate
        run: |
          set -o pipefail
          timeout 120 cmake --build build --target run-buildroot-usability 2>&1 | tee build/gcc-smoke.log

      - name: Upload gcc-smoke log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gcc-smoke-log
          path: build/gcc-smoke.log
          if-no-files-found: ignore
