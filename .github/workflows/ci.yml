name: Cinux CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]

jobs:
  host-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          submodules: recursive

      - name: Install dependencies
        run: sudo apt-get install -y qemu-system-x86 e2fsprogs python3

      - name: Compiler version
        run: echo "GCC $(gcc --version | head -1)"

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCINUX_BUILD_TESTS=ON -S .

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run host tests
        working-directory: build
        run: make test_host

  line-limits:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Check line-count limits
        run: python3 scripts/check_line_limits.py --hpp 500

  kernel-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          submodules: recursive

      - name: Install dependencies
        run: sudo apt-get install -y qemu-system-x86 e2fsprogs python3

      - name: Compiler version
        run: echo "GCC $(gcc --version | head -1)"

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCINUX_BUILD_TESTS=ON -S .

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run kernel tests
        working-directory: build
        run: make run-kernel-test
