name: Build Images

# Manually-triggered image builder: click "Run workflow", type a version label,
# get cinux-<version>.img + console/desktop rootfs back as workflow artifacts
# (downloadable from the run page, 90-day retention). Deliberately creates NO
# git tag and NO GitHub Release -- releasing is a separate manual step.
#
# Both variants share the SAME rootfs (buildroot base + GCC closure, packed by
# assemble-gcc-rootfs into rootfs-gcc.ext2). They differ only in the KERNEL:
#   console -- GUI=OFF (shell_launch -> /bin/sh; boots to a shell)
#   desktop -- GUI=ON  (desktop_launch -> /cinux_gui_host; boots to the desktop)
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label stamped onto image filenames (e.g. v1.0.0, v1.1.0-rc1)'
        required: true

jobs:
  build:
    name: build (${{ matrix.variant }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        # Same rootfs (buildroot + GCC + cinux_gui_host); the kernel differs.
        variant: [console, desktop]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-cinux
        with:
          # Both variants build buildroot + assemble the GCC closure now, so both
          # need the gcc-13 family (cc1 ships in cpp-13) + buildroot deps.
          apt-packages: qemu-system-x86 e2fsprogs python3 curl bzip2 linux-libc-dev bc xxd rsync cpio ncurses-dev libssl-dev bison flex gcc-13 g++-13 cpp-13 binutils libc6-dev libgcc-13-dev libstdc++-13-dev
          cache-musl: 'true'
          cache-busybox: 'true'
          cache-buildroot: 'true'
          # console = GUI=OFF (shell); desktop = GUI=ON (desktop, default). Both
          # use the buildroot rootfs profile (no handcrafted ext2 anymore).
          cmake-flags: -DCMAKE_BUILD_TYPE=Release -DCINUX_ROOTFS_PROFILE=buildroot ${{ matrix.variant == 'console' && '-DCINUX_GUI=OFF' || '' }}

      - name: Build musl + busybox user binaries
        run: |
          tools/musl/build-musl.sh
          tools/musl/build-hello.sh
          tools/musl/build-forktest.sh
          tools/musl/build-busybox.sh

      - name: Build buildroot base rootfs (cached)
        run: scripts/build-buildroot.sh build/buildroot-ci cinuxos_base_defconfig

      - name: Build kernel + boot disk image (cinux.img = MBR + stage2 + mini + big_kernel)
        run: cmake --build build --target image -j$(nproc)

      - name: Assemble rootfs (buildroot + GCC closure + cinux_gui_host -> rootfs-gcc.ext2)
        env:
          BR_TARGET: ${{ github.workspace }}/build/buildroot-ci/output/target
          GCC_BIN: gcc-13
        run: cmake --build build --target assemble-gcc-rootfs -j$(nproc)

      - name: Stage images with the version label
        id: stage
        run: |
          VER="${{ github.event.inputs.version }}"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          mkdir -p staging
          # boot disk (kernel) -- differs per variant (console=GUI=OFF, desktop=GUI=ON).
          cp build/cinux.img "staging/cinux-${VER}.img"
          # same rootfs for both variants; suffix distinguishes the variant.
          cp build/rootfs-gcc.ext2 "staging/cinux-${VER}-${{ matrix.variant }}.ext2"
          # one-liner runner so the downloaded image boots with the right qemu flags.
          cp scripts/run-release.sh "staging/run.sh"
          ls -la staging/

      - name: Upload images as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: cinux-${{ steps.stage.outputs.version }}-${{ matrix.variant }}
          path: staging/*
          retention-days: 90
          if-no-files-found: error
